<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Page</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://img1.pic.in.th/images/AKIRAX-LISTNAME-1.png') no-repeat center center/cover;
      color: #ffffff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .logo {
      width: 130px;
      height: 130px;
      margin-bottom: 20px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    h4 {
      margin-bottom: 20px;
      font-weight: normal;
      opacity: 0.8;
    }

    .btn {
      padding: 12px 25px;
      font-size: 16px;
      color: white;
      background: linear-gradient(45deg, #1f1f1f, #333);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: linear-gradient(45deg, #000000, #ffffff);
      transform: scale(1.05);
    }

    /* ⭐ ดาวลอย */
    .star {
      position: fixed;
      bottom: -20px;
      background: white;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: starUp 7s linear infinite;
      opacity: 0.8;
      z-index: 1;
    }

    @keyframes starUp {
      0% { transform: translateY(0) scale(0.4); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-120vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="https://img1.pic.in.th/images/152s.png" alt="Logo" class="logo">
    <h1>AKIRAX LIST NAME</h1>
    <h4>━━━━ Support By one player in Winterfell Stark ━━━━</h4>
    <button class="btn" onclick="goNext()">Listname</button>
  </div>

  <script>
    function goNext() {
      window.location.href = "AKIRA WEB.HTML";
    }

    // สร้างดาวลอย
    function createStar() {
      const star = document.createElement('div');
      star.classList.add('star');

      star.style.left = Math.random() * 100 + 'vw';

      const size = Math.random() * 4 + 2;
      star.style.width = size + 'px';
      star.style.height = size + 'px';

      star.style.animationDuration = (Math.random() * 5 + 5) + 's';

      document.body.appendChild(star);

      setTimeout(() => {
        star.remove();
      }, 8000);
    }

    setInterval(createStar, 300);
  </script>

</body>
</html>
